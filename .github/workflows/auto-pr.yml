name: Auto PR to main

on:
  push:
    branches: [development]

jobs:
  create-pr:
    runs-on: ubuntu-latest
    # Skip if the push is a merge commit from main (prevents loop)
    if: ${{ !contains(github.event.head_commit.message, 'Merge pull request') || !contains(github.event.head_commit.message, 'from Antonio112009/main') }}
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for meaningful diff
        id: diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Only create PR if development is actually ahead of main
          if git diff origin/main...origin/development --quiet; then
            echo "has_diff=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_diff=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update PR development → main
        if: steps.diff.outputs.has_diff == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check if an open PR from development → main already exists
          existing_pr=$(gh pr list --base main --head development --state open --json number --jq '.[0].number')

          if [ -n "$existing_pr" ]; then
            echo "PR #$existing_pr already exists, it will auto-update with new commits."
          else
            gh pr create \
              --base main \
              --head development \
              --title "Merge development into main" \
              --body "Automated PR to promote changes from \`development\` to \`main\`."
          fi
